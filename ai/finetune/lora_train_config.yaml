# LoRA Fine-tuning config for DeepSeek-R1-Distill-Qwen-7B
# MLX-LM format

model: "deepseek-ai/DeepSeek-R1-Distill-Qwen-7B"
train: true
data: "data/splits/finetune"
adapter_path: "ai/finetune/adapters/deepseek-7b-lora"

# LoRA params
fine_tune_type: "lora"
num_layers: 8

# Training params
batch_size: 1
iters: 600
learning_rate: 1e-5
steps_per_report: 10
steps_per_eval: 100
val_batches: 25
save_every: 200
max_seq_length: 1024
grad_checkpoint: true
seed: 42
